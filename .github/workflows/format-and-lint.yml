name: CI/CD and Vercel Deployment

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main", "feature/*" ]

env:
  FRONTEND_DIR: ./frontend
  BACKEND_DIR: ./backend
  VERCEL_URL: https://pi-meta-connect.vercel.app
  VALIDATION_FILE: validation-key.txt

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            ${{ env.FRONTEND_DIR }}/package-lock.json
            ${{ env.BACKEND_DIR }}/package-lock.json
            package-lock.json

      - name: Install Dependencies
        run: |
          if [ -f "${{ env.FRONTEND_DIR }}/package-lock.json" ]; then
            echo "Installing frontend dependencies..."
            cd ${{ env.FRONTEND_DIR }}
            npm ci
            cd -
          fi
          if [ -f "${{ env.BACKEND_DIR }}/package-lock.json" ]; then
            echo "Installing backend dependencies..."
            cd ${{ env.BACKEND_DIR }}
            npm ci
            cd -
          fi
          if [ ! -f "${{ env.FRONTEND_DIR }}/package-lock.json" ] && [ ! -f "${{ env.BACKEND_DIR }}/package-lock.json" ]; then
            echo "No package-lock.json found in frontend or backend. Installing in root..."
            npm ci || echo "No package-lock.json found in root, skipping installation."
          fi

      - name: Run Tests
        run: |
          if [ -f "${{ env.FRONTEND_DIR }}/package.json" ]; then
            echo "Running frontend tests..."
            cd ${{ env.FRONTEND_DIR }}
            npm test || echo "No tests defined for frontend, skipping."
            cd -
          fi
          if [ -f "${{ env.BACKEND_DIR }}/package.json" ]; then
            echo "Running backend tests..."
            cd ${{ env.BACKEND_DIR }}
            npm test || echo "No tests defined for backend, skipping."
            cd -
          fi
          if [ ! -f "${{ env.FRONTEND_DIR }}/package.json" ] && [ ! -f "${{ env.BACKEND_DIR }}/package.json" ]; then
            echo "Running tests in root..."
            npm test || echo "No tests defined in root, skipping."
          fi

      - name: Run Linting
        run: |
          if [ -f "${{ env.FRONTEND_DIR }}/package.json" ]; then
            echo "Running frontend linting..."
            cd ${{ env.FRONTEND_DIR }}
            npm run lint || echo "No lint script defined for frontend, skipping."
            cd -
          fi
          if [ -f "${{ env.BACKEND_DIR }}/package.json" ]; then
            echo "Running backend linting..."
            cd ${{ env.BACKEND_DIR }}
            npm run lint || echo "No lint script defined for backend, skipping."
            cd -
          fi
          if [ ! -f "${{ env.FRONTEND_DIR }}/package.json" ] && [ ! -f "${{ env.BACKEND_DIR }}/package.json" ]; then
            echo "Running linting in root..."
            npm run lint || echo "No lint script defined in root, skipping."
          fi

      - name: Notify on Failure
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `CI Failure: ${context.sha}`,
              body: `CI job failed for commit ${context.sha}. Please check the workflow logs for details.`,
            });
            console.log(`Created issue: ${issue.data.html_url}`);

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            ${{ env.FRONTEND_DIR }}/package-lock.json
            ${{ env.BACKEND_DIR }}/package-lock.json
            package-lock.json

      - name: Install Dependencies
        run: |
          if [ -f "${{ env.FRONTEND_DIR }}/package-lock.json" ]; then
            echo "Installing frontend dependencies..."
            cd ${{ env.FRONTEND_DIR }}
            npm ci
            cd -
          fi
          if [ -f "${{ env.BACKEND_DIR }}/package-lock.json" ]; then
            echo "Installing backend dependencies..."
            cd ${{ env.BACKEND_DIR }}
            npm ci
            cd -
          fi
          if [ ! -f "${{ env.FRONTEND_DIR }}/package-lock.json" ] && [ ! -f "${{ env.BACKEND_DIR }}/package-lock.json" ]; then
            echo "No package-lock.json found in frontend or backend. Installing in root..."
            npm ci || echo "No package-lock.json found in root, skipping installation."
          fi

      - name: Verify Vercel Secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_ORG_ID }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "Error: Missing Vercel secrets (VERCEL_TOKEN, VERCEL_ORG_ID, or VERCEL_PROJECT_ID). Please configure them in repository secrets."
            exit 1
          fi

      - name: Create validation-key.txt
        run: |
          mkdir -p public
          echo "5d8bc63cfa473df9a90c3308432e255c892f4b363143dfd8fa98c6c44d1b0bda13b78ce5a9c195b1648220c33a7b4f026b8176c0a0c87ba421c309533a57480c" > public/validation-key.txt
          echo "Created validation-key.txt successfully!"

      - name: Create vercel.json
        run: |
          echo '{"version": 2, "builds": [{"src": "index.js", "use": "@vercel/node"}], "routes": [{"src": "/validation-key.txt", "dest": "/public/validation-key.txt"}, {"src": "/(.*)", "dest": "index.js"}]}' > vercel.json
          echo "Created vercel.json successfully!"

      - name: Deploy to Vercel
        run: npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Notify on Deployment Failure
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deployment Failure: ${context.sha}`,
              body: `Deployment job failed for commit ${context.sha}. Please check the workflow logs for details.`,
            });
            console.log(`Created issue: ${issue.data.html_url}`);
