name: Code Formatting and Linting

on:
  push:
    branches: [ "main", "Ze0ro99-patch-1" ]
  pull_request:
    branches: [ "main", "Ze0ro99-patch-1" ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Check for JavaScript Files
        run: |
          if ! ls *.js >/dev/null 2>&1; then
            echo "No JavaScript files found. Skipping linting..."
            exit 0
          fi
          echo "JavaScript files found, proceeding..."

      - name: Install Prettier
        run: |
          npm install --save-dev prettier
          echo "Prettier installed successfully!"

      - name: Create Prettier Configuration
        run: |
          echo '{"semi": true, "trailingComma": "es5", "singleQuote": true, "printWidth": 80}' > .prettierrc
          echo "Created .prettierrc successfully!"

      - name: Run Prettier
        run: |
          npx prettier --write .
          echo "Prettier formatting completed!"
