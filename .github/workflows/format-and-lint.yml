# اسم العملية
name: التحقق من الكود

# متى يتم تشغيل العملية
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# المهام
jobs:
  lint:
    # تشغيل المهمة على نظام Ubuntu الأحدث
    runs-on: ubuntu-latest

    # الخطوات
    steps:
      # سحب الكود من المستودع
      - name: سحب الكود
        uses: actions/checkout@v4

      # إعداد Node.js
      - name: إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # إعداد Prettier (للتحقق من JavaScript/TypeScript)
      - name: إعداد Prettier
        run: |
          npm install --save-dev prettier
          npx prettier --write "**/*.{js,ts,tsx}"

      # إعداد Python
      - name: إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # إعداد Black (للتحقق من Python)
      - name: إعداد Black
        run: |
          pip install black
          black --line-length=79 --extend-exclude=103 .

      # إعداد Clang-Tidy (للتحقق من C++)
      - name: إعداد Clang-Tidy
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy
          clang-tidy --fix .

      # إعداد ShellCheck (للتحقق من الـ Shell Scripts)
      - name: إعداد ShellCheck
        run: |
          sudo apt-get install -y shellcheck
          shellcheck -x .

      # تشغيل الأوامر النهائية
      - name: تشغيل أوامر التحقق
        run: echo "تم التحقق من الكود بنجاح!"
