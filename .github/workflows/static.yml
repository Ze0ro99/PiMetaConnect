name: Deploy to Vercel (Static)

on:
  push:
    branches: [ "main", "Ze0ro99-patch-1" ]
  pull_request:
    branches: [ "main", "Ze0ro99-patch-1" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies and Express
        run: |
          if ! grep -q '"express"' package.json; then
            echo "Express not found in package.json, installing..."
            npm install express --save
          fi
          npm ci
          echo "Dependencies and Express installed successfully!"

      - name: Verify Express Installation
        run: |
          if [ ! -d node_modules/express ]; then
            echo "Error: Express not installed correctly"
            exit 1
          fi
          echo "Express installed successfully!"

      - name: Create validation-key.txt
        run: |
          mkdir -p public
          echo "5d8bc63cfa473df9a90c3308432e255c892f4b363143dfd8fa98c6c44d1b0bda13b78ce5a9c195b1648220c33a7b4f026b8176c0a0c87ba421c309533a57480c" > public/validation-key.txt
          echo "Created validation-key.txt successfully!"

      - name: Create vercel.json
        run: |
          echo '{"version": 2, "builds": [{"src": "index.js", "use": "@vercel/node"}], "routes": [{"src": "/validation-key.txt", "dest": "/public/validation-key.txt"}, {"src": "/(.*)", "dest": "index.js"}]}' > vercel.json
          echo "Created vercel.json successfully!"

      - name: Verify Vercel Secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "Error: VERCEL_TOKEN not set"
            exit 1
          fi
          if [ -z "${{ secrets.VERCEL_ORG_ID }}" ]; then
            echo "Error: VERCEL_ORG_ID not set"
            exit 1
          fi
          if [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "Error: VERCEL_PROJECT_ID not set"
            exit 1
          fi
          echo "Vercel secrets verified successfully!"

      - name: Deploy to Vercel
        run: npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
