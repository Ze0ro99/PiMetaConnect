name: Unified Workflow for PiMetaConnect

on:
  push:
    branches:
      - main
      - 'feature/*'
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  NODE_VERSION: '20'
  FRONTEND_DIR: './frontend'
  BACKEND_DIR: './backend'

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Required Tools
        run: |
          command -v node || exit 1
          command -v npm || exit 1
          command -v python3 || exit 1
          command -v pip3 || exit 1

      - name: Set Up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies for Frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci

      - name: Install Dependencies for Backend
        working-directory: ${{ env.BACKEND_DIR }}
        run: npm ci

  lint-and-test:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [frontend, backend]
    steps:
      - name: Navigate to ${{ matrix.component }}
        run: cd ${{ env[matrix.component] }}

      - name: Run Linting
        run: npm run lint:fix

      - name: Run Tests
        run: npm test || echo "Tests failed."

  build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Build Frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run build

      - name: Build Backend
        working-directory: ${{ env.BACKEND_DIR }}
        run: echo "No specific build step for backend."

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Vercel
        run: npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  notify:
    needs: [lint-and-test, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Failure
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE: "Workflow Failed"
          SLACK_MESSAGE: "A failure occurred in the workflow for commit ${{ github.sha }}."
