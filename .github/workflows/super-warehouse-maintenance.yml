name: Super Warehouse Maintenance

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # Install Python dependencies
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint flask

      # Run Python linting
      - name: Run Python linting
        run: |
          pylint ./backend/Backend/api.py || true
          pylint ./repo_manager.py || true

      # Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      # Install Node.js dependencies
      - name: Install Node.js dependencies
        run: npm install

      # Run ESLint
      - name: Run ESLint
        run: npx eslint ./Frontend-App.js || true

      # Run ShellCheck for shell scripts
      - name: Run ShellCheck
        run: |
          if [ -f "./git-clone-automation.sh" ]; then
            shellcheck ./git-clone-automation.sh || true
          else
            echo "Shell script not found: ./git-clone-automation.sh"
          fi

      # Validate YAML syntax
      - name: Validate YAML files
        uses: ibiqlik/action-yamllint@v1

      # Validate CSS syntax
      - name: Validate CSS files
        run: |
          if [ -f "responsive.css" ] && [ -f "virtualworld.css" ]; then
            npx stylelint "responsive.css" "virtualworld.css" || true
          else
            echo "CSS files not found: responsive.css, virtualworld.css"

      # Validate JSON files
      - name: Validate JSON files
        run: |
          if [ -f "./backend/backend/vercel.json" ]; then
            jq empty ./backend/backend/vercel.json || true
          else
            echo "JSON file not found: ./backend/backend/vercel.json"

      # Navigate and verify server
      - name: Verify server navigation
        run: |
          echo "Navigating through server files..."
          if [ -d "./backend" ]; then
            ls -al ./backend
          else
            echo "Backend directory not found: ./backend"
