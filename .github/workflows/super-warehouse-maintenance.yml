name: Super Warehouse Maintenance

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # Install Python dependencies
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint flask

      # Run Python linting
      - name: Run Python linting
        run: |
          pylint ./backend/Backend/api.py
          pylint ./repo_manager.py

      # Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      # Install Node.js dependencies
      - name: Install Node.js dependencies
        run: npm install

      # Run ESLint
      - name: Run ESLint
        run: npx eslint ./Frontend-App.js

      # Run ShellCheck for shell scripts
      - name: Run ShellCheck
        run: shellcheck ./git-clone-automation.sh

      # Validate YAML syntax
      - name: Validate YAML files
        uses: ibiqlik/action-yamllint@v1
        with:
          yaml_files: |
            .github/workflows/ci.yml
            .github/workflows/dotnet-build.yml

      # Validate CSS syntax
      - name: Validate CSS files
        run: |
          npx stylelint "responsive.css" "virtualworld.css"

      # Validate JSON files
      - name: Validate JSON files
        run: |
          jq empty ./backend/backend/vercel.json

      # Navigate and verify server
      - name: Verify server navigation
        run: |
          echo "Navigating through server files..."
          ls -al ./backend
          echo "Verifying server navigation logic..."
          # Add any custom navigation logic or validation scripts here
