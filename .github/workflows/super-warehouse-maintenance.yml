---
name: Super Warehouse Maintenance

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # Add timeout to prevent hanging jobs

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4 # Updated to latest version
        with:
          fetch-depth: 1 # Shallow clone for performance

      # Set up Python with caching
      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to latest version
        with:
          python-version: '3.9'
          cache: 'pip' # Cache pip dependencies

      # Install Python dependencies
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint flask

      # Run Python linting with detailed error handling
      - name: Run Python linting
        run: |
          pylint ./backend/Backend/api.py --exit-zero || { echo "Python linting failed for api.py"; exit 1; }
          pylint ./repo_manager.py --exit-zero || { echo "Python linting failed for repo_manager.py"; exit 1; }

      # Set up Node.js with caching
      - name: Set up Node.js
        uses: actions/setup-node@v4 # Updated to latest version
        with:
          node-version: '16'
          cache: 'npm' # Cache npm dependencies

      # Install Node.js dependencies
      - name: Install Node.js dependencies
        run: npm ci # Use npm ci for faster, deterministic installs

      # Run ESLint with detailed error handling
      - name: Run ESLint
        run: |
          npx eslint ./Frontend-App.js --max-warnings=0 || { echo "ESLint failed"; exit 1; }

      # Run ShellCheck for shell scripts
      - name: Run ShellCheck
        run: |
          if [[ -f "./git-clone-automation.sh" ]]; then
            shellcheck ./git-clone-automation.sh || { echo "ShellCheck failed"; exit 1; }
          else
            echo "Shell script not found: ./git-clone-automation.sh"
          fi

      # Validate YAML syntax with custom configuration
      - name: Validate YAML files
        uses: ibiqlik/action-yamllint@v3 # Updated to latest version
        with:
          config_file: .yamllint.yml # Use a custom configuration file
          strict: true # Enforce stricter linting
          format: colored

      # Validate CSS syntax
      - name: Validate CSS files
        run: |
          if [[ -f "responsive.css" && -f "virtualworld.css" ]]; then
            npx stylelint "responsive.css" "virtualworld.css" --max-warnings=0 || { echo "CSS linting failed"; exit 1; }
          else
            echo "CSS files not found: responsive.css, virtualworld.css"
            exit 1
          fi

      # Validate JSON files
      - name: Validate JSON files
        run: |
          if [[ -f "./backend/backend/vercel.json" ]]; then
            jq empty ./backend/backend/vercel.json || { echo "JSON validation failed"; exit 1; }
          else
            echo "JSON file not found: ./backend/backend/vercel.json"
            exit 1
          fi

      # Navigate and verify server
      - name: Verify server navigation
        run: |
          echo "Navigating through server files..."
          if [[ -d "./backend" ]]; then
            ls -al ./backend
          else
            echo "Backend directory not found: ./backend"
            exit 1
          fi

      # Notify on failure (advanced feature)
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            const message = 'Super Warehouse Maintenance workflow failed! Check the logs for details.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message
            });
