---
name: Super Warehouse Maintenance

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Set up Python with caching
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      # Install Python dependencies
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint flask

      # Run Python linting
      - name: Run Python linting
        run: |
          pylint ./backend/Backend/api.py
          pylint ./repo_manager.py

      # Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      # Install Node.js dependencies
      - name: Install Node.js dependencies
        run: npm install

      # Run ESLint
      - name: Run ESLint
        run: |
          npx eslint ./Frontend-App.js --max-warnings=0

      # Notify on failure (only for pull requests)
      - name: Notify on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const message = 'Super Warehouse Maintenance workflow failed! Check the logs for details.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message
            });

      # Create issue on failure for push events
      - name: Create issue on failure for push
        if: failure() && github.event_name == 'push'
        uses: actions/github-script@v6
        with:
          script: |
            const message = 'Super Warehouse Maintenance workflow failed on push to main! Check the logs for details.';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Workflow Failure: Super Warehouse Maintenance',
              body: message
            });
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
