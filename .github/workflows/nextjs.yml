name: Code Formatting and Linting

on:
  push:
    branches: [ "main", "Ze0ro99-patch-1" ]
  pull_request:
    branches: [ "main", "Ze0ro99-patch-1" ]

env:
  FRONTEND_DIR: ./frontend
  BACKEND_DIR: ./backend

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            ${{ env.FRONTEND_DIR }}/package-lock.json
            ${{ env.BACKEND_DIR }}/package-lock.json

      - name: Install Prettier
        run: |
          if [ -f "${{ env.FRONTEND_DIR }}/package-lock.json" ]; then
            echo "Installing frontend dependencies..."
            cd ${{ env.FRONTEND_DIR }}
            npm install --save-dev prettier
            cd -
          fi
          if [ -f "${{ env.BACKEND_DIR }}/package-lock.json" ]; then
            echo "Installing backend dependencies..."
            cd ${{ env.BACKEND_DIR }}
            npm install --save-dev prettier
            cd -
          fi
          if [ ! -f "${{ env.FRONTEND_DIR }}/package-lock.json" ] && [ ! -f "${{ env.BACKEND_DIR }}/package-lock.json" ]; then
            echo "No package-lock.json found. Installing Prettier in root..."
            npm install --save-dev prettier
          fi
          echo "Prettier installed successfully!"

      - name: Create Prettier Configuration
        run: |
          echo '{"semi": true, "trailingComma": "es5", "singleQuote": true, "printWidth": 80}' > .prettierrc
          echo "Created .prettierrc successfully!"

      - name: Run Prettier
        run: |
          npx prettier --write .
          echo "Prettier formatting completed!"
