# اسم العملية
name: نشر موقع Next.js على GitHub Pages

# متى يتم تشغيل العملية
on:
  # تشغيل العملية عند الدفع إلى الفرع الرئيسي (main)
  push:
    branches: ["main"]

  # تشغيل العملية يدويًا من صفحة Actions
  workflow_dispatch:

# تعيين أذونات GITHUB_TOKEN للنشر على GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# السماح بتنفيذ عملية نشر واحدة فقط في نفس الوقت
concurrency:
  group: "pages"
  cancel-in-progress: false

# المهام
jobs:
  # مهمة البناء
  build:
    # تشغيل المهمة على نظام Ubuntu الأحدث
    runs-on: ubuntu-latest
    steps:
      # سحب الكود
      - name: سحب الكود
        uses: actions/checkout@v4

      # اكتشاف مدير الحزم
      - name: اكتشاف مدير الحزم
        id: detect-package-manager
        run: |
          if [ -f "${{ github.workspace }}/yarn.lock" ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "command=install" >> $GITHUB_OUTPUT
            echo "runner=yarn" >> $GITHUB_OUTPUT
          elif [ -f "${{ github.workspace }}/package.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=ci" >> $GITHUB_OUTPUT
            echo "runner=npx --no-install" >> $GITHUB_OUTPUT
          else
            echo "غير قادر على تحديد مدير الحزم"
            exit 1
          fi

      # إعداد Node.js
      - name: إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"  # استخدام Node.js الإصدار 20
          cache: ${{ steps.detect-package-manager.outputs.manager }}

      # تهيئة GitHub Pages
      - name: تهيئة GitHub Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next  # تهيئة Next.js تلقائيًا

      # استعادة ذاكرة التخزين المؤقت للبناء
      - name: استعادة ذاكرة التخزين المؤقت للبناء
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
            node_modules
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-

      # تثبيت التبعيات
      - name: تثبيت التبعيات
        run: ${{ steps.detect-package-manager.outputs.manager }} ${{ steps.detect-package-manager.outputs.command }}

      # البناء باستخدام Next.js
      - name: البناء باستخدام Next.js
        run: ${{ steps.detect-package-manager.outputs.runner }} next build

      # رفع الملفات الناتجة
      - name: رفع الملفات الناتجة
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # مهمة النشر
  deploy:
    # إعداد البيئة
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # تشغيل المهمة على نظام Ubuntu الأحدث
    runs-on: ubuntu-latest
    # تعتمد على مهمة البناء
    needs: build
    steps:
      # النشر على GitHub Pages
      - name: النشر على GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
